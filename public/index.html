<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dummy Online — เกมไพ่ดัมมี่</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Lobby -->
    <template id="tpl-lobby">
      <div class="lobby">
        <h1>🃏 Dummy Online</h1>
        <p class="tagline">เกมไพ่ดัมมี่ไทย — 2 ถึง 4 คน</p>
        <label>ชื่อผู้เล่น
          <input id="name-input" maxlength="20" placeholder="พิมพ์ชื่อ" />
        </label>
        <div class="lobby-actions">
          <button id="btn-create">สร้างห้อง</button>
          <div class="divider">หรือ</div>
          <div class="join-row">
            <input id="code-input" maxlength="5" placeholder="รหัสห้อง" style="text-transform:uppercase" />
            <button id="btn-join">เข้าห้อง</button>
          </div>
        </div>
        <details class="config">
          <summary>กติกาย่อ</summary>
          <ul class="rulesbrief">
            <li><b>สเปโต:</b> 2♣ กับ Q♠ = 50 แต้ม</li>
            <li><b>หัว:</b> ไพ่ใบแรกบนกองทิ้ง = +50 (หัวสเปโต +100)</li>
            <li><b>เกิด:</b> ต้องมีไพ่ที่จั่ว/เก็บมาอย่างน้อย 1 ใบ / <b>ฝาก:</b> ต้องเคยเกิดแล้ว</li>
            <li><b>น็อก:</b> +50 / มืด ×2 / สี ×2 / มืดสี ×4</li>
            <li><b>ลบ:</b> ทิ้งมี่ ทิ้งเต็ม ทิ้งโง่ ถูกฝากสเปโต ปี้หัว (ครั้งละ −50), ลบมืด ×(−2)</li>
          </ul>
        </details>
        <div class="err" id="lobby-err"></div>
      </div>
    </template>

    <!-- Waiting room -->
    <template id="tpl-waiting">
      <div class="waiting">
        <h1>ห้อง <span id="room-code"></span></h1>
        <p>ส่งรหัสห้องให้เพื่อน แล้วให้เจ้าของห้องกด "เริ่มเกม" (2–4 คน)</p>
        <div class="players" id="waiting-players"></div>
        <button id="btn-start">เริ่มเกม</button>
        <button id="btn-leave" class="ghost">ออกจากห้อง</button>
      </div>
    </template>

    <!-- Game -->
    <template id="tpl-game">
      <div class="game">
        <header class="topbar">
          <span>ห้อง <b id="g-code"></b></span>
          <span>รอบที่ <b id="g-round"></b></span>
          <span id="g-phase" class="phase"></span>
          <button id="btn-leave-g" class="ghost sm">ออก</button>
        </header>

        <section class="opponents" id="opponents"></section>

        <section class="table">
          <div class="table-center">
            <div class="pile stock" id="stock-pile" title="จั่วจากกอง">
              <div class="pile-count" id="stock-count"></div>
              <div class="pile-label">กอง</div>
            </div>
            <div class="pile discard" id="discard-pile" title="เก็บใบบนสุด">
              <div id="discard-top-card"></div>
              <div class="pile-label">กองทิ้ง</div>
            </div>
            <div class="head-info" id="head-info"></div>
          </div>
          <div class="melds" id="melds"></div>
        </section>

        <section class="myhand-wrap">
          <div class="myhand-header">
            <span>ไพ่ในมือ — <span id="hand-count"></span> ใบ</span>
            <span class="mustuse" id="mustuse"></span>
          </div>
          <div class="myhand" id="myhand"></div>
          <div class="actions">
            <button id="btn-meld" disabled title="เกิด (ใช้ไพ่ที่เลือกอย่างน้อย 3 ใบ, ต้องมีไพ่ที่จั่วมา ≥1)">เกิด</button>
            <button id="btn-layoff" disabled title="ฝากไพ่ที่เลือก (ต้องเคยเกิดแล้ว)">ฝาก</button>
            <button id="btn-discard" disabled title="ทิ้งไพ่ที่เลือก 1 ใบ">ทิ้ง</button>
            <button id="btn-clear" class="ghost">ยกเลิกการเลือก</button>
          </div>
        </section>

        <aside class="side">
          <div class="scores" id="scores"></div>
          <div class="log" id="log"></div>
        </aside>

        <div id="round-modal" class="modal hidden">
          <div class="modal-card large">
            <h3 id="round-title">จบรอบ</h3>
            <div id="round-scores"></div>
            <div class="modal-actions">
              <button id="btn-next-round">เล่นรอบต่อไป</button>
              <button id="btn-leave-round" class="ghost">ออกจากห้อง</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/client.js"></script>
  </body>
</html>
